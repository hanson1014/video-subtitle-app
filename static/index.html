<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影片字幕翻譯工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #fff;
        }
        .subtitle {
            color: #888;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        input[type="text"] {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid #333;
            border-radius: 10px;
            background: #1a1a1a;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #4a9eff;
        }
        input[type="text"]::placeholder {
            color: #555;
        }
        .options-row {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        select {
            padding: 10px 14px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a1a;
            color: #fff;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }
        select:focus {
            border-color: #4a9eff;
        }
        button {
            padding: 14px 32px;
            border: none;
            border-radius: 10px;
            background: #4a9eff;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
        }
        button:hover { background: #3a8eef; }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .progress-section {
            margin-top: 24px;
            display: none;
        }
        .progress-section.active { display: block; }
        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 8px;
            background: #1a1a1a;
            font-size: 14px;
        }
        .step .icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }
        .step.waiting .icon { background: #333; color: #666; }
        .step.running .icon { background: #4a9eff22; color: #4a9eff; }
        .step.done .icon { background: #22c55e22; color: #22c55e; }
        .step.error .icon { background: #ef444422; color: #ef4444; }
        .step.running {
            border: 1px solid #4a9eff33;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #4a9eff33;
            border-top-color: #4a9eff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .progress-bar-container {
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: #4a9eff;
            border-radius: 2px;
            transition: width 0.3s;
            width: 0%;
        }
        .srt-preview {
            margin-top: 24px;
            display: none;
        }
        .srt-preview.active { display: block; }
        .srt-preview h3 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #fff;
        }
        .srt-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .srt-tab {
            padding: 6px 16px;
            border-radius: 6px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #888;
            cursor: pointer;
            font-size: 13px;
        }
        .srt-tab.active {
            background: #4a9eff22;
            border-color: #4a9eff;
            color: #4a9eff;
        }
        .srt-content {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 16px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            color: #ccc;
        }
        .downloads {
            margin-top: 24px;
            display: none;
        }
        .downloads.active { display: block; }
        .downloads h3 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #fff;
        }
        .download-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }
        .download-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #4a9eff;
            text-decoration: none;
            font-size: 13px;
            transition: border-color 0.2s;
        }
        .download-btn:hover {
            border-color: #4a9eff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>影片字幕翻譯工具</h1>
        <p class="subtitle">貼上影片網址，自動轉錄並翻譯字幕（全部本地運行）</p>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="貼上影片網址（YouTube、Twitter 等）" />
            <button id="startBtn" onclick="startProcess()">開始處理</button>
        </div>

        <div class="options-row">
            <select id="targetLang">
                <option value="" disabled>目標語言</option>
            </select>
            <select id="whisperModel">
                <option value="tiny">Whisper Tiny（最快）</option>
                <option value="base">Whisper Base</option>
                <option value="small">Whisper Small</option>
                <option value="medium" selected>Whisper Medium（推薦）</option>
                <option value="large-v3">Whisper Large V3（最準）</option>
            </select>
        </div>

        <div class="progress-section" id="progressSection">
            <div class="step waiting" id="step-download">
                <div class="icon">1</div>
                <div>
                    <div>下載影片</div>
                    <div class="step-msg" style="color:#666;font-size:12px;margin-top:2px;"></div>
                </div>
            </div>
            <div class="step waiting" id="step-extract">
                <div class="icon">2</div>
                <div>
                    <div>提取音頻</div>
                    <div class="step-msg" style="color:#666;font-size:12px;margin-top:2px;"></div>
                </div>
            </div>
            <div class="step waiting" id="step-transcribe">
                <div class="icon">3</div>
                <div>
                    <div>語音轉錄</div>
                    <div class="step-msg" style="color:#666;font-size:12px;margin-top:2px;"></div>
                </div>
            </div>
            <div class="step waiting" id="step-translate">
                <div class="icon">4</div>
                <div>
                    <div>翻譯字幕</div>
                    <div class="step-msg" style="color:#666;font-size:12px;margin-top:2px;"></div>
                    <div class="progress-bar-container" style="display:none;width:200px;">
                        <div class="progress-bar"></div>
                    </div>
                </div>
            </div>
            <div class="step waiting" id="step-burn">
                <div class="icon">5</div>
                <div>
                    <div>燒錄字幕到影片</div>
                    <div class="step-msg" style="color:#666;font-size:12px;margin-top:2px;"></div>
                </div>
            </div>
        </div>

        <div class="srt-preview" id="srtPreview">
            <h3>字幕預覽</h3>
            <div class="srt-tabs" id="srtTabs"></div>
            <div class="srt-content" id="srtContent"></div>
        </div>

        <div class="downloads" id="downloads">
            <h3>下載</h3>
            <div class="download-grid" id="downloadGrid"></div>
        </div>
    </div>

    <script>
        let ws = null;
        const srtData = {};

        // Load languages
        fetch('/api/languages').then(r => r.json()).then(data => {
            const select = document.getElementById('targetLang');
            for (const [code, name] of Object.entries(data.languages)) {
                const opt = document.createElement('option');
                opt.value = code;
                opt.textContent = `${name} (${code})`;
                if (code === 'zh-TW') opt.selected = true;
                select.appendChild(opt);
            }
        });

        function startProcess() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return;

            const targetLang = document.getElementById('targetLang').value;
            const whisperModel = document.getElementById('whisperModel').value;

            // Reset UI
            document.getElementById('startBtn').disabled = true;
            document.getElementById('progressSection').classList.add('active');
            document.getElementById('srtPreview').classList.remove('active');
            document.getElementById('downloads').classList.remove('active');
            document.querySelectorAll('.step').forEach(s => {
                s.className = 'step waiting';
                s.querySelector('.icon').innerHTML = s.querySelector('.icon').textContent;
                s.querySelector('.step-msg').textContent = '';
            });

            // Connect WebSocket
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/ws/process`);

            ws.onopen = () => {
                ws.send(JSON.stringify({ url, target_lang: targetLang, whisper_model: whisperModel }));
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };

            ws.onerror = () => {
                document.getElementById('startBtn').disabled = false;
            };

            ws.onclose = () => {
                document.getElementById('startBtn').disabled = false;
            };
        }

        function handleMessage(data) {
            const { step, status, message } = data;

            if (step === 'error') {
                alert('錯誤: ' + message);
                document.getElementById('startBtn').disabled = false;
                return;
            }

            const stepEl = document.getElementById('step-' + step);
            if (!stepEl) return;

            const msgEl = stepEl.querySelector('.step-msg');
            msgEl.textContent = message || '';

            if (status === 'started') {
                stepEl.className = 'step running';
                stepEl.querySelector('.icon').innerHTML = '<div class="spinner"></div>';
            } else if (status === 'done') {
                stepEl.className = 'step done';
                stepEl.querySelector('.icon').innerHTML = '✓';
            } else if (status === 'error') {
                stepEl.className = 'step error';
                stepEl.querySelector('.icon').innerHTML = '✗';
            } else if (status === 'progress') {
                const bar = stepEl.querySelector('.progress-bar-container');
                bar.style.display = 'block';
                bar.querySelector('.progress-bar').style.width = data.progress + '%';
            }

            // Show SRT preview
            if (data.srt_preview) {
                const label = step === 'transcribe' ? '原文字幕' : '翻譯字幕';
                srtData[label] = data.srt_preview;
                showSrtPreview();
            }

            // Show downloads
            if (data.downloads) {
                showDownloads(data.downloads);
            }

            // Complete
            if (step === 'complete') {
                document.getElementById('startBtn').disabled = false;
            }
        }

        function showSrtPreview() {
            const preview = document.getElementById('srtPreview');
            preview.classList.add('active');

            const tabs = document.getElementById('srtTabs');
            tabs.innerHTML = '';

            const keys = Object.keys(srtData);
            keys.forEach((key, i) => {
                const tab = document.createElement('div');
                tab.className = 'srt-tab' + (i === keys.length - 1 ? ' active' : '');
                tab.textContent = key;
                tab.onclick = () => {
                    tabs.querySelectorAll('.srt-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById('srtContent').textContent = srtData[key];
                };
                tabs.appendChild(tab);
            });

            document.getElementById('srtContent').textContent = srtData[keys[keys.length - 1]];
        }

        function showDownloads(downloads) {
            const section = document.getElementById('downloads');
            section.classList.add('active');

            const grid = document.getElementById('downloadGrid');
            grid.innerHTML = '';

            const items = [
                { key: 'video', label: '字幕影片 (MP4)', icon: '🎬' },
                { key: 'original_srt', label: '原文字幕 (SRT)', icon: '📝' },
                { key: 'translated_srt', label: '翻譯字幕 (SRT)', icon: '🌐' },
                { key: 'dual_srt', label: '雙語字幕 (SRT)', icon: '📋' },
            ];

            items.forEach(({ key, label, icon }) => {
                if (downloads[key]) {
                    const a = document.createElement('a');
                    a.href = downloads[key];
                    a.className = 'download-btn';
                    a.download = '';
                    a.innerHTML = `<span>${icon}</span><span>${label}</span>`;
                    grid.appendChild(a);
                }
            });
        }

        // Allow Enter key to submit
        document.getElementById('urlInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') startProcess();
        });
    </script>
</body>
</html>
